services:
  postgres:
    image: postgres:17
    container_name: ai_chat_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_chat
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_chat_redis
    ports:
      - "6379:6379"

volumes:
  pg_data: